<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação Médica</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; }
        button { background-color: #0088cc; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Autenticação de Profissional</h2>
    
    <label for="cpf">CPF:</label>
    <input type="text" id="cpf" placeholder="Digite seu CPF">

    <label for="senha">Senha Institucional:</label>
    <input type="password" id="senha" placeholder="Sua senha">

    <p id="status-qr">QR Code: ❌ Não escaneado</p>
    <button onclick="escanearQR()">📷 Escanear Carteira (QR Code)</button>

    <button onclick="enviarDados()" style="background-color: #28a745; margin-top: 30px;">✅ Validar Identidade</button>

    <script>
        // Inicializa o Mini App do Telegram
        let tg = window.Telegram.WebApp;
        tg.expand(); // Abre o app em tela cheia

        let dadosQR = "";

        // 3. Função nativa do Telegram para abrir a câmera e ler o QR Code
        function escanearQR() {
            tg.showScanQrPopup({text: "Aponte para o QR Code da Carteira Médica"}, function(textoLido) {
                dadosQR = textoLido;
                document.getElementById("status-qr").innerText = "QR Code: ✅ Escaneado com sucesso!";
                return true; // Fecha o popup da câmera
            });
        }

        // 4. Empacota os dados e envia de volta para o seu bot em Python
        function enviarDados() {
            let cpf = document.getElementById("cpf").value;
            let senha = document.getElementById("senha").value;

            if (!dadosQR || !cpf || !senha) {
                tg.showAlert("Por favor, preencha todos os campos e escaneie o QR Code.");
                return;
            }

            let pacoteDados = {
                qr_code: dadosQR,
                cpf: cpf,
                senha: senha
            };

            // Envia os dados de volta para o bot
            tg.sendData(JSON.stringify(pacoteDados));
    
            // Fecha o Mini App automaticamente
            tg.close(); 
        }
    </script>
</body>
</html>
