<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MFA - Validação Independente</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        #reader { width: 300px; margin: 20px auto; }
        .sucesso { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Autenticação de Profissional (Web)</h2>
    <input type="text" id="cpf" placeholder="CPF">
    <input type="password" id="senha" placeholder="Senha">
    
    <div id="reader"></div> <p id="msg"></p>

    <button onclick="enviarDados()" style="padding: 15px; background: #28a745; color: white;">Finalizar Login</button>

    <script>
        let dadosQR = "";

        // Inicializa a câmera no navegador comum
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
            (textoLido) => {
                dadosQR = textoLido;
                document.getElementById("msg").innerText = "✅ QR Code capturado!";
            }
        );

        async function enviarDados() {
            const cpf = document.getElementById("cpf").value;
            const senha = document.getElementById("senha").value;

            // Envia para o seu servidor Python (Flask)
            const resposta = await fetch('http://localhost:5000/validar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cpf, senha, qr_code: dadosQR })
            });

            const resultado = await resposta.json();
            alert(resultado.mensagem);
        }
    </script>
</body>
</html>
